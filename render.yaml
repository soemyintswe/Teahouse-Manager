services:
  - type: web
    name: teahouse-api
    env: node
    plan: free
    rootDir: .
    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm -C artifacts/api-server run build
    startCommand: pnpm -C artifacts/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: web
    name: teahouse-web
    env: static
    plan: free
    rootDir: .
    buildCommand: |
      corepack enable
      pnpm install --frozen-lockfile
      pnpm -C artifacts/min-khaung-rms run build
    staticPublishPath: artifacts/min-khaung-rms/dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html