services:
  - type: web
    name: teahouse-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: |
      npm install -g pnpm
      pnpm install --frozen-lockfile
      pnpm -C artifacts/api-server run build
    startCommand: pnpm -C artifacts/api-server run start
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: postgresql://neondb_owner:npg_tNMU4Cn9OxAz@ep-blue-scene-ancrv0zj.c-6.us-east-1.aws.neon.tech/neondb?sslmode=require
      - key: CORS_ORIGINS
        fromService:
          type: web
          name: teahouse-web
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: teahouse-web
    runtime: static
    rootDir: .
    buildCommand: |
      npm install -g pnpm
      pnpm install --frozen-lockfile
      pnpm -C artifacts/min-khaung-rms run build
    staticPublishPath: artifacts/min-khaung-rms/dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: teahouse-api
          envVarKey: RENDER_EXTERNAL_URL
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
