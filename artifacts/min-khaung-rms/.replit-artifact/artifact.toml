kind = "web"
previewPath = "/"
title = "Min Khaung Tea House & Restaurant"
version = "1.0.0"
id = "artifacts/min-khaung-rms"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26187

[services.development]
run = "pnpm --filter @workspace/min-khaung-rms run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/min-khaung-rms", "run", "build" ]
publicDir = "artifacts/min-khaung-rms/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26187"
BASE_PATH = "/"
